name: deploy-migrations
on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - 'supabase/config.toml'
      - '.github/workflows/deploy-migrations.yml'
  workflow_dispatch: # manual re-run for failed deploys older than GitHub's 30-day rerun window (#337)
concurrency:
  group: deploy-migrations
  cancel-in-progress: false
permissions:
  contents: read
  issues: write
jobs:
  push:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
    steps:
      - uses: actions/checkout@v6
      - uses: supabase/setup-cli@v2
        with:
          version: latest
      # Link + push are idempotent, so retrying the pair once covers the
      # transient runner/network failures we've seen (#337) without any
      # risk of double-applying a migration.
      - name: Link and push migrations
        run: |
          deploy() {
            supabase link --project-ref "$PROJECT_REF" && supabase db push --linked
          }
          if ! deploy; then
            echo "::warning::first deploy attempt failed; retrying in 30s"
            sleep 30
            deploy
          fi
      # `db push --dry-run` exits 0 whether or not migrations are pending,
      # so assert on the in-sync message: anything else — pending
      # migrations or unexpected output — fails the job.
      - name: Verify remote schema is in sync
        run: |
          out=$(supabase db push --linked --dry-run 2>&1)
          echo "$out"
          if ! grep -qF 'Remote database is up to date.' <<< "$out"; then
            echo "::error::remote database does not match local migrations after push"
            exit 1
          fi
      # The SPA deploys via Cloudflare Pages on every push regardless of
      # this workflow's outcome, so a red run here means prod is serving
      # frontend code against a stale schema. Make that impossible to miss.
      - name: File issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo "The migration deploy failed, so the production database is behind the SPA that Cloudflare Pages deployed for the same commit (see #337 for the failure mode this causes)."
            echo
            echo "Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo "Commit: ${GITHUB_SHA}"
            echo
            echo "After fixing the cause, re-deploy with \`gh workflow run deploy-migrations\` and close this issue once the run is green."
          } > /tmp/issue-body.md
          gh issue create \
            --repo "$GITHUB_REPOSITORY" \
            --title "deploy-migrations failed on main ($(date -u +%Y-%m-%d), run ${GITHUB_RUN_ID})" \
            --body-file /tmp/issue-body.md
