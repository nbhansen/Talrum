name: ci
on:
  pull_request:
  push:
    branches: [main]
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}
jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      # config.toml env-interpolates auth.site_url / additional_redirect_urls;
      # unset, every supabase CLI call warns (#260). CI never exercises auth
      # redirects — these are the local-dev values from the config.toml comment.
      SUPABASE_AUTH_SITE_URL: http://127.0.0.1:3000
      SUPABASE_AUTH_REDIRECT_URL: https://127.0.0.1:3000
      # The CLI's telemetry writer can crash ("NotFound: FileSystem.rename
      # ~/.supabase/telemetry.json.tmp...") when two invocations run
      # concurrently — observed 2026-06-11 when `supabase status` raced the
      # backgrounded `functions serve`. CI needs no telemetry; this is the
      # CLI's documented opt-out.
      DO_NOT_TRACK: '1'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run lint:css
      # Coverage thresholds (vite.config.ts) gate here — they are ratchet
      # floors: raise them as coverage rises, never lower them to pass.
      - run: npm run test:coverage
      - run: npm run build
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: npm run test:functions
      - uses: supabase/setup-cli@v2
        with:
          # Pinned: v2.106.0 (2026-06-11) ported `gen types` to the new TS CLI
          # and broke `--local` generation ("Access token not provided"),
          # failing the types-drift step. Bump deliberately after verifying
          # `supabase gen types typescript --local` works without a token.
          version: 2.105.0
      - name: Reserve Supabase ports from ephemeral assignment (#310)
        # Supabase's fixed host ports (5432x) sit inside the kernel's ephemeral
        # source-port range (32768–60999). A runner process's outbound connection
        # can land on one, and `supabase start` then dies binding it (EADDRINUSE).
        run: sudo sysctl -w net.ipv4.ip_local_reserved_ports=54320-54329
      - run: supabase start
      - name: Regenerate supabase types and fail on drift (#132)
        run: |
          npm run types:db
          git diff --exit-code src/types/supabase.ts
      - run: npm run test:db
      - name: Serve function in background
        run: |
          mkdir -p supabase/functions
          cat > supabase/functions/.env.local <<EOF
          SUPABASE_URL=$(supabase status -o json | jq -r '.API_URL')
          SUPABASE_SERVICE_ROLE_KEY=$(supabase status -o json | jq -r '.SERVICE_ROLE_KEY')
          EOF
          nohup supabase functions serve delete-account --env-file supabase/functions/.env.local &>/tmp/funcs.log &
          # Wait for the function to start serving. POST with no auth: the
          # handler returns 401 once it's actually serving. 5xx means the
          # gateway is up but the function isn't — accepting it here lets the
          # e2e step run against a stalled function and exit non-zero with no
          # useful diagnostics. Require a 4xx (handler response) instead.
          # Reuse the URL captured into .env.local above — another
          # `supabase status` here would run concurrently with the
          # backgrounded serve, the exact telemetry race that emptied
          # API_URL and failed this step on 2026-06-11.
          API_URL="$(grep '^SUPABASE_URL=' supabase/functions/.env.local | cut -d= -f2-)"
          ready=0
          for i in {1..30}; do
            STATUS=$(curl -sS --max-time 2 -o /dev/null -w '%{http_code}' \
              -X POST -H 'Content-Type: application/json' --data '{}' \
              "$API_URL/functions/v1/delete-account" || echo "000")
            if [[ "$STATUS" =~ ^4[0-9][0-9]$ ]]; then
              echo "function ready (HTTP $STATUS)"; ready=1; break
            fi
            sleep 1
          done
          if [[ "$ready" -ne 1 ]]; then
            echo "function did not become ready within 30s (last HTTP $STATUS)" >&2
            cat /tmp/funcs.log >&2 || true
            exit 1
          fi
      - run: npm run test:e2e:delete-account
      - if: failure()
        name: Dump function logs on failure
        run: cat /tmp/funcs.log || true
      - if: always()
        run: supabase stop

  migration-drift:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      # With the DB password, `supabase link` stores session-pooler (IPv4)
      # credentials and `migration list --linked` connects through the pooler —
      # same pattern as deploy.yml. Without it the CLI can fall back
      # to the direct IPv6 address, unreachable from GitHub-hosted runners,
      # when the project is paused or freshly resumed (observed 2026-07-05
      # after a free-tier auto-pause).
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      # Optional override: a full session-pooler connection string; when set,
      # the drift script uses --db-url and skips --linked entirely.
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      # Same telemetry opt-out as the verify job.
      DO_NOT_TRACK: '1'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - uses: supabase/setup-cli@v2
        with:
          # Same pin as the verify job — keep both jobs on one CLI version.
          version: 2.105.0
      - run: supabase link --project-ref "$PROJECT_REF"
      - run: npm run migrations:check-drift
